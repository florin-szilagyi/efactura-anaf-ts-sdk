name: Release anaf-cli

# ──────────────────────────────────────────────────────────────
# Trigger:
#   • Push of a tag matching cli-v*.*.* (e.g. cli-v0.1.0 or cli-v1.0.0-preview.1)
#   • Manual run via workflow_dispatch for testing
#
# Build matrix:
#   • npm package (Ubuntu)
#   • SEA binary for darwin-arm64, darwin-x64, linux-x64
#
# Outputs:
#   • GitHub Release (draft) with the 3 tar.gz SEA artifacts, the npm .tgz,
#     and a SHA256SUMS file
#   • npm publish of the `anaf-cli` package (skipped on dry runs)
# ──────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'cli-v*.*.*'
      - 'cli-v*.*.*-*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build artifacts but skip npm publish and release upload'
        required: false
        default: 'true'

env:
  # Pinned Node version — SEA requires byte-matching between blob generator
  # and injected binary, so keep this pinned across jobs.
  NODE_VERSION: '20.18.1'

jobs:
  # ─────────────────────────── Tests + npm tarball ───────────
  test-and-pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      cli_version: ${{ steps.read_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install (workspace)
        run: pnpm install --frozen-lockfile
      - name: Build SDK
        run: pnpm --filter @florinszilagyi/anaf-ts-sdk run build
      - name: Verify CLI
        run: pnpm --filter @florinszilagyi/anaf-cli run verify
      - name: Check COMMANDS.md is up to date
        run: pnpm --filter @florinszilagyi/anaf-cli run gen-docs:check
      - name: Read CLI version
        id: read_version
        run: |
          VERSION=$(node -e "console.log(require('./cli/package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "CLI version: $VERSION"
      - name: Pack npm tarball
        working-directory: cli
        run: pnpm pack --pack-destination ./artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: cli/artifacts/*.tgz

  # ─────────────────────────── SEA binaries per platform ────
  build-sea:
    needs: test-and-pack
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # arm64 runner
            target: darwin-arm64
            ext: ''
          - os: ubuntu-latest
            target: linux-x64
            ext: ''
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      CLI_VERSION: ${{ needs.test-and-pack.outputs.cli_version }}
      TARGET: ${{ matrix.target }}
      EXT: ${{ matrix.ext }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install (workspace)
        run: pnpm install --frozen-lockfile
      - name: Build SDK
        run: pnpm --filter @florinszilagyi/anaf-ts-sdk run build
      - name: Build CLI bundle
        run: pnpm --filter @florinszilagyi/anaf-cli run build
      - name: Build SEA binary
        run: |
          mkdir -p "cli/dist/sea/${TARGET}"
          node cli/scripts/build-sea.mjs \
            --bundle cli/dist/bin/anaf-cli.cjs \
            --output "cli/dist/sea/${TARGET}/anaf-cli${EXT}"
      - name: Smoke test binary
        run: |
          BIN="./cli/dist/sea/${TARGET}/anaf-cli${EXT}"
          "$BIN" --version
          "$BIN" --help > /dev/null
          "$BIN" schema print UblBuild > /dev/null
      - name: Pack tarball
        run: |
          mkdir -p cli/dist/release
          cd "cli/dist/sea/${TARGET}"
          tar -czf "../../release/anaf-cli-${CLI_VERSION}-${TARGET}.tar.gz" "anaf-cli${EXT}"
      - uses: actions/upload-artifact@v4
        with:
          name: sea-${{ matrix.target }}
          path: cli/dist/release/*.tar.gz

  # ─────────────────────────── Publish ───────────────────────
  publish:
    needs: [test-and-pack, build-sea]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.dry_run != 'true'
    permissions:
      contents: write
    env:
      CLI_VERSION: ${{ needs.test-and-pack.outputs.cli_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: 'https://registry.npmjs.org/'
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts
      - name: Compute SHA256SUMS
        run: |
          mkdir -p ./release-final
          cp ./release-artifacts/sea-darwin-arm64/*.tar.gz ./release-final/
          cp ./release-artifacts/sea-linux-x64/*.tar.gz ./release-final/
          cp ./release-artifacts/npm-tarball/*.tgz ./release-final/
          cd ./release-final
          sha256sum *.tar.gz *.tgz > SHA256SUMS
          cat SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-final/*
          body_path: ./release-final/SHA256SUMS
          # Publish on tag pushes so Homebrew tap URLs resolve immediately;
          # workflow_dispatch dry-runs are gated by the job-level `if:` above.
          draft: false
          prerelease: ${{ contains(needs.test-and-pack.outputs.cli_version, '-') }}
      - name: Install (workspace, for publish)
        run: pnpm install --frozen-lockfile
      - name: Build CLI
        run: |
          pnpm --filter @florinszilagyi/anaf-ts-sdk run build
          pnpm --filter @florinszilagyi/anaf-cli run build
      - name: Publish to npm (dry-run default)
        run: |
          cd cli
          if [ "${{ github.event_name }}" = "push" ]; then
            pnpm publish --no-git-checks --access public
          else
            pnpm publish --no-git-checks --access public --dry-run
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─────────────────────────── Homebrew tap update ──────────
  # Renders cli/Formula/anaf-cli.rb with the published version and the SHA256
  # of each platform tarball, then commits to the
  # florin-szilagyi/homebrew-anaf-cli tap repo. Skipped on dry-runs.
  homebrew:
    needs: [test-and-pack, publish]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLI_VERSION: ${{ needs.test-and-pack.outputs.cli_version }}
    steps:
      - name: Checkout source repo (for formula template)
        uses: actions/checkout@v4
        with:
          path: source
      - name: Download release tarballs
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Compute SHA256s
        id: shas
        run: |
          ARM64_SHA=$(sha256sum "release-artifacts/sea-darwin-arm64/anaf-cli-${CLI_VERSION}-darwin-arm64.tar.gz" | awk '{print $1}')
          LINUX_SHA=$(sha256sum "release-artifacts/sea-linux-x64/anaf-cli-${CLI_VERSION}-linux-x64.tar.gz" | awk '{print $1}')
          echo "arm64=$ARM64_SHA" >> "$GITHUB_OUTPUT"
          echo "linux=$LINUX_SHA" >> "$GITHUB_OUTPUT"
          echo "darwin-arm64: $ARM64_SHA"
          echo "linux-x64: $LINUX_SHA"
      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: florin-szilagyi/homebrew-anaf-cli
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Render formula
        env:
          ARM64_SHA: ${{ steps.shas.outputs.arm64 }}
          LINUX_SHA: ${{ steps.shas.outputs.linux }}
        run: |
          mkdir -p tap/Formula
          # sed with | as delimiter to avoid issues with paths/URLs.
          sed \
            -e "s|REPLACE_WITH_VERSION|${CLI_VERSION}|g" \
            -e "s|REPLACE_WITH_DARWIN_ARM64_SHA256|${ARM64_SHA}|g" \
            -e "s|REPLACE_WITH_LINUX_X64_SHA256|${LINUX_SHA}|g" \
            source/cli/Formula/anaf-cli.rb > tap/Formula/anaf-cli.rb
          echo "--- rendered formula ---"
          cat tap/Formula/anaf-cli.rb
      - name: Commit and push to tap
        working-directory: tap
        env:
          COMMIT_MESSAGE: "anaf-cli ${{ env.CLI_VERSION }}"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/anaf-cli.rb; then
            echo "Formula already up to date for ${CLI_VERSION}; nothing to commit."
            exit 0
          fi
          git add Formula/anaf-cli.rb
          git commit -m "$COMMIT_MESSAGE"
          git push
